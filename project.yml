name: MaestroRemote

options:
  bundleIdPrefix: com.maestro
  deploymentTarget:
    iOS: 17.0

targets:
  MaestroRemote:
    type: application
    platform: iOS
    sources:
      - path: MaestroRemote
    info:
      path: MaestroRemote/Info.plist
      properties:
        CFBundleDisplayName: "Maestro Remote"
        NSLocalNetworkUsageDescription: "Maestro Remote needs local network access to find and connect to Maestro on your Mac."
        NSBonjourServices:
          - "_maestro._tcp"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
    settings:
      base:
        SWIFT_VERSION: "5.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.maestro.MaestroRemote
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: MaestroRemote/Info.plist
        SWIFT_STRICT_CONCURRENCY: minimal
